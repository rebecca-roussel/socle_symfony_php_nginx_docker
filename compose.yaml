services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: socle_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:alpine
    container_name: socle_nginx
    depends_on:
      - php
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro